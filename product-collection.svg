  <!-- center pot, taller -->
  <path d="M175 275 L195 335 L235 335 L255 275 Z" fill="#8a5a30"/>
  <path d="M215 275 C190 240 195 195 215 165 C235 195 240 240 215 275Z" fill="#79a629"/>
  <path d="M215 210 C245 200 262 178 260 156 C226 154 210 182 215 210Z" fill="#4f8a2d"/>
  <!-- right pot -->
  <path d="M240 260 L258 320 L298 320 L316 260 Z" fill="#a9723f"/>
  <circle cx="278" cy="225" r="35" fill="#5c9a2e"/>
</svg>
